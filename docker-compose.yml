services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://aegis:aegis123@mongo:27017/aegisdb?authSource=admin
      - NODE_ENV=production
      - DAA_API_KEY=${DAA_API_KEY}
      - DAA_BASE_URL=https://api.daathena.com/api/v2
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - aegis-network

  mongo:
    image: mongo:7
    container_name: aegis-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=aegis
      - MONGO_INITDB_ROOT_PASSWORD=aegis123
      - MONGO_INITDB_DATABASE=aegisdb
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegis-network

  nginx:
    image: nginx:alpine
    container_name: aegis-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - aegis-network

volumes:
  mongo_data:

networks:
  aegis-network:
    driver: bridge
